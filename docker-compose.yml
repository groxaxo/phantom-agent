version: "3.9"

services:
  phantom-agent:
    build: .
    environment:
      - LLM_BASE_URL=http://vllm:8000/v1
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen3-8B}
      - LLM_API_KEY=${LLM_API_KEY:-no-key}
      - HEADLESS=true
      - MAX_STEPS=${MAX_STEPS:-25}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - vllm
    # Pass task as command arg:
    #   docker compose run phantom-agent --task "Search for latest AI news"

  vllm:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - VLLM_MODEL=${LLM_MODEL:-Qwen/Qwen3-8B}
    command:
      - --model
      - ${LLM_MODEL:-Qwen/Qwen3-8B}
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.9"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    ports:
      - "8000:8000"
    volumes:
      - vllm-cache:/root/.cache/huggingface

volumes:
  vllm-cache:
